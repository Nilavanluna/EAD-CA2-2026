---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipe-be
  namespace: recipe-app
  labels:
    app: recipe-be
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recipe-be
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: recipe-be
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: be
          image: ghcr.io/YOUR_GITHUB_USERNAME/ead-ca2-be:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: databaseUrl
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_URI
            - name: databaseName
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_DB
            - name: databaseCollection
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_COLLECTION
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: recipe-be-service
  namespace: recipe-app
spec:
  selector:
    app: recipe-be
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

---
# Additional Feature 1: HPA — auto-scales backend 2 to 5 pods on CPU load
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: recipe-be-hpa
  namespace: recipe-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: recipe-be
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
