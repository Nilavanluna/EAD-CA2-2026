apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipe-be
  namespace: recipe-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recipe-be
  template:
    metadata:
      labels:
        app: recipe-be
    spec:
      containers:
        - name: be
          image: ghcr.io/YOUR_USERNAME/ead_ca2_2026-be:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATA_MONGODB_HOST
              value: 'mongodb'
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: recipe-be-service
  namespace: recipe-app
spec:
  selector:
    app: recipe-be
  ports:
    - port: 8080
      targetPort: 8080
