name: Frontend CI/CD (Test → Scan → Build → Deploy)
on:
  push:
    paths: ['EAD_FE_CA2/**']
    branches: [main]
  pull_request:
    paths: ['EAD_FE_CA2/**']
permissions:
  contents: read
  packages: write
  security-events: write
env:
  IMAGE: ghcr.io/nilavanluna/ead-ca2-2026/ead-ca2-fe # ✅ lowercase FIXED
jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Run NPM Tests
        run: cd EAD_FE_CA2 && npm ci && npm test
  build-scan-push:
    name: Build, Trivy Scan & Push
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./EAD_FE_CA2
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ env.IMAGE }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      - name: Upload Trivy SARIF to GitHub Security
        if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
  deploy-aks:
    name: Deploy to AKS
    needs: build-scan-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: AKS Set Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ca2-rg
          cluster-name: ca2-aks
      - name: Rolling Update — Frontend
        run: |
          kubectl set image deployment/recipe-fe \
            fe=${{ env.IMAGE }}:${{ github.sha }} \
            -n recipe-app
          kubectl rollout status deployment/recipe-fe \
            -n recipe-app --timeout=300s
