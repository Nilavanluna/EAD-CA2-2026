apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipe-fe
  namespace: recipe-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recipe-fe
  template:
    metadata:
      labels:
        app: recipe-fe
    spec:
      containers:
        - name: fe
          image: ghcr.io/nilavanluna/ead-ca2-2026-fe:latest # Lowercase repo
          ports:
            - containerPort: 22137
          env:
            - name: WEBSERVICE_HOST
              value: 'recipe-be-service'
            - name: WEBSERVICE_PORT
              value: '8080'
---
apiVersion: v1
kind: Service
metadata:
  name: recipe-fe-service
  namespace: recipe-app
spec:
  selector:
    app: recipe-fe
  ports:
    - port: 80
      targetPort: 22137
  type: LoadBalancer
