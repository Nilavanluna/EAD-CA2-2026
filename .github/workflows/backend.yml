name: Backend CI/CD

on:
  push:
    paths: ['EAD_BE_CA2/**']
    branches: [main]
  pull_request:
    paths: ['EAD_BE_CA2/**']

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run Maven Tests
        run: cd EAD_BE_CA2 && mvn test

  build-scan-push:
    name: Build Scan and Push
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build Docker Image
        run: docker build -t ghcr.io/nilavanluna/ead-ca2-2026/ead-ca2-be:${{ github.sha }} -t ghcr.io/nilavanluna/ead-ca2-2026/ead-ca2-be:latest ./EAD_BE_CA2
      - name: Push Docker Image
        run: |
          docker push ghcr.io/nilavanluna/ead-ca2-2026/ead-ca2-be:${{ github.sha }}
          docker push ghcr.io/nilavanluna/ead-ca2-2026/ead-ca2-be:latest
      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/nilavanluna/ead-ca2-2026/ead-ca2-be:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      - name: Upload Trivy SARIF to GitHub Security
        if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-aks:
    name: Deploy to AKS
    needs: build-scan-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: AKS Set Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ca2-rg
          cluster-name: ca2-aks
      - name: Apply Kubernetes Manifests
        run: kubectl apply -f EAD_FE_CA2/k8s/ --namespace=recipe-app
      - name: Rolling Update Backend
        run: |
          kubectl set image deployment/recipe-be be=ghcr.io/nilavanluna/ead-ca2-2026/ead-ca2-be:${{ github.sha }} -n recipe-app
          kubectl rollout status deployment/recipe-be -n recipe-app --timeout=300s
      - name: Rollback on Failure
        if: failure()
        run: |
          echo "Deployment failed rolling back backend"
          kubectl rollout undo deployment/recipe-be -n recipe-app
