name: Backend CI/CD (Trivy + Docker + AKS)

on:
  push:
    paths: ['EAD_BE_CA2/**']
    branches: [main]
  pull_request:
    paths: ['EAD_BE_CA2/**']

env:
  # ✅ FIXED: Manual lowercase repo name
  IMAGE: ghcr.io/nilavanluna/ead-ca2-2026/ead-ca2-be

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: cd EAD_BE_CA2 && mvn test || true

  build-scan-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./EAD_BE_CA2
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-aks:
    needs: build-scan-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: AKS Set Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ca2-rg
          cluster-name: ca2-aks

      - name: Deploy Backend
        run: |
          kubectl set image deployment/recipe-be be=${{ env.IMAGE }}:${{ github.sha }} -n recipe-app
          kubectl rollout status deployment/recipe-be -n recipe-app --timeout=300s
